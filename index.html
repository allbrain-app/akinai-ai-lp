<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アキナイAI｜LINE × AI で、リピートを自動化</title>
<meta name="description" content="飲食店向けLINE×AIリピート自動化SaaS。注文・顧客管理・AI配信・味覚分析をワンストップで。月額1,980円〜">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;font-size:16px;}
body{font-family:'Noto Sans JP',sans-serif;color:#1e293b;background:#fff;line-height:1.8;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
img{max-width:100%;height:auto;display:block;}
ul{list-style:none;}

.container{max-width:1080px;margin:0 auto;padding:0 24px;}
.section{padding:100px 0;}
.section-dark{background:#1a2332;color:#e2e8f0;}
.section-light{background:#f8fafc;}
.section-white{background:#fff;}
.section-label{display:inline-block;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#3b82f6;margin-bottom:12px;}
.section-title{font-size:clamp(24px,4vw,36px);font-weight:700;line-height:1.4;margin-bottom:16px;}
.section-sub{font-size:15px;color:#64748b;max-width:640px;margin-bottom:48px;}
.section-dark .section-sub{color:#94a3b8;}
.text-center{text-align:center;}
.mx-auto{margin-left:auto;margin-right:auto;}

/* ===== HEADER (no CTA button) ===== */
.site-header{position:fixed;top:0;left:0;width:100%;z-index:100;background:rgba(26,35,50,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06);}
.header-inner{display:flex;align-items:center;justify-content:center;height:56px;max-width:1080px;margin:0 auto;padding:0 24px;}
.header-logo{font-size:18px;font-weight:700;color:#fff;letter-spacing:.5px;}
.header-logo span{color:#3b82f6;}

/* ===== HERO ===== */
.hero{position:relative;min-height:92vh;display:flex;align-items:center;justify-content:center;text-align:center;background:linear-gradient(160deg,#1a2332 0%,#273548 50%,#1a2332 100%);color:#fff;padding:120px 24px 80px;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-40%;right:-20%;width:600px;height:600px;background:radial-gradient(circle,rgba(59,130,246,.12) 0%,transparent 70%);pointer-events:none;}
.hero-content{position:relative;z-index:2;max-width:720px;}
.hero-badge{display:inline-block;font-size:12px;font-weight:600;letter-spacing:1.5px;color:#60a5fa;border:1px solid rgba(96,165,250,.3);padding:6px 16px;border-radius:40px;margin-bottom:24px;}
.hero h1{font-size:clamp(28px,5.5vw,52px);font-weight:700;line-height:1.3;margin-bottom:20px;letter-spacing:-.5px;}
.hero h1 em{font-style:normal;background:linear-gradient(90deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero p{font-size:clamp(15px,2.5vw,18px);color:#94a3b8;margin-bottom:40px;line-height:1.8;}
.btn-primary{display:inline-flex;align-items:center;gap:8px;font-size:16px;font-weight:600;color:#fff;background:linear-gradient(135deg,#3b82f6,#2563eb);padding:16px 36px;border-radius:8px;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 24px rgba(59,130,246,.3);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(59,130,246,.4);}
.btn-secondary{display:block;text-align:center;font-size:14px;font-weight:500;color:#94a3b8;margin-top:16px;transition:color .2s;}
.btn-secondary:hover{color:#fff;}

/* ===== PAIN POINTS ===== */
.pain-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px;}
.pain-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:36px 28px;text-align:center;transition:box-shadow .3s,transform .3s;}
.pain-card:hover{box-shadow:0 8px 32px rgba(0,0,0,.06);transform:translateY(-4px);}
.pain-icon{width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 20px;background:#eff6ff;color:#3b82f6;}
.pain-card h3{font-size:17px;font-weight:600;margin-bottom:10px;color:#1e293b;}
.pain-card p{font-size:14px;color:#64748b;line-height:1.7;}

/* ===== BEFORE / AFTER ===== */
.ba-block{margin-bottom:64px;padding-bottom:64px;border-bottom:1px solid rgba(255,255,255,.08);}
.ba-block:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
.ba-label{font-size:14px;font-weight:600;color:#60a5fa;margin-bottom:12px;}
.ba-heading{font-size:clamp(18px,3vw,24px);font-weight:700;margin-bottom:28px;}
.ba-content{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start;}
.ba-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:20px;align-items:start;}
.ba-col{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:24px;}
.ba-col-label{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.1);}
.ba-col-label.before{color:#f87171;}
.ba-col-label.after{color:#34d399;}
.ba-col li{font-size:14px;line-height:1.8;margin-bottom:8px;color:#cbd5e1;}
.ba-col .before-item::before{content:'✕';color:#f87171;font-weight:700;margin-right:8px;}
.ba-col .after-item::before{content:'✓';color:#34d399;font-weight:700;margin-right:8px;}
.ba-arrow{display:flex;align-items:center;justify-content:center;font-size:28px;color:#3b82f6;padding-top:40px;}
.ba-stat{display:flex;gap:20px;margin-top:20px;}
.ba-stat-box{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);border-radius:10px;padding:16px 20px;text-align:center;flex:1;}
.ba-stat-num{font-size:32px;font-weight:700;color:#60a5fa;}
.ba-stat-label{font-size:12px;color:#94a3b8;margin-top:4px;}
.ba-feature-link{display:inline-block;font-size:13px;color:#60a5fa;margin-top:16px;font-weight:500;}

.ba-screenshot{display:flex;justify-content:center;align-items:flex-start;gap:16px;}
.phone-mockup{background:#222d3d;border-radius:24px;padding:8px;box-shadow:0 20px 60px rgba(0,0,0,.35);max-width:220px;width:100%;position:relative;overflow:hidden;}
.phone-mockup.small{max-width:180px;}
.phone-notch{width:80px;height:6px;background:#1a2332;border-radius:3px;margin:4px auto 6px;opacity:.6;}
.phone-mockup img{width:100%;border-radius:16px;display:block;}

/* ===== NUMBER IMPACT ===== */
.num-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px;}
.num-card{text-align:center;padding:40px 20px;}
.num-value{font-size:clamp(40px,6vw,64px);font-weight:700;background:linear-gradient(135deg,#3b82f6,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.num-unit{font-size:18px;font-weight:600;}
.num-label{font-size:14px;color:#64748b;margin-top:8px;}
.num-note{font-size:12px;color:#94a3b8;text-align:center;margin-top:32px;}

/* ===== COMPARISON TABLE ===== */
.compare-table{width:100%;border-collapse:collapse;font-size:14px;}
.compare-table thead th{padding:16px 12px;font-weight:600;font-size:13px;text-align:center;border-bottom:2px solid #e2e8f0;}
.compare-table thead th:first-child{text-align:left;}
.compare-table thead th.highlight{color:#3b82f6;background:#eff6ff;border-radius:8px 8px 0 0;}
.compare-table tbody td{padding:14px 12px;text-align:center;border-bottom:1px solid #f1f5f9;color:#475569;}
.compare-table tbody td:first-child{text-align:left;font-weight:500;color:#1e293b;}
.compare-table tbody td.highlight{background:#f8faff;font-weight:600;color:#1e293b;}
.compare-table .check{color:#3b82f6;font-weight:700;font-size:18px;}
.compare-table .cross{color:#cbd5e1;font-size:18px;}
.compare-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid #e2e8f0;border-radius:12px;}

/* ===== FEATURES ===== */
.feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
.feat-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:32px 24px;transition:box-shadow .3s,transform .3s;}
.feat-card:hover{box-shadow:0 8px 32px rgba(0,0,0,.06);transform:translateY(-4px);}
.feat-icon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:16px;background:#eff6ff;color:#3b82f6;}
.feat-card h3{font-size:16px;font-weight:600;margin-bottom:8px;}
.feat-card p{font-size:13px;color:#64748b;line-height:1.7;}

/* ===== PRICING ===== */
.price-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;padding-bottom:16px;padding-top:20px;}
.price-scroll::-webkit-scrollbar{height:4px;}
.price-scroll::-webkit-scrollbar-track{background:#e2e8f0;border-radius:2px;}
.price-scroll::-webkit-scrollbar-thumb{background:#3b82f6;border-radius:2px;}
.price-grid{display:flex;gap:28px;align-items:start;min-width:max-content;}
.price-card{min-width:300px;flex-shrink:0;scroll-snap-align:center;background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:36px 28px;padding-top:44px;text-align:center;position:relative;transition:box-shadow .3s,transform .3s;}
.price-card:hover{box-shadow:0 8px 32px rgba(0,0,0,.06);transform:translateY(-4px);}
.price-card.recommended{border-color:#3b82f6;box-shadow:0 0 0 1px #3b82f6;}
.price-badge{position:absolute;top:-14px;left:50%;transform:translateX(-50%);background:#3b82f6;color:#fff;font-size:12px;font-weight:700;padding:6px 20px;border-radius:20px;letter-spacing:.5px;white-space:nowrap;z-index:2;}
.price-plan{font-size:14px;font-weight:600;color:#64748b;margin-bottom:8px;}
.price-amount{font-size:42px;font-weight:700;color:#1e293b;line-height:1;}
.price-amount span{font-size:14px;font-weight:500;color:#64748b;}
.price-period{font-size:13px;color:#94a3b8;margin-top:4px;margin-bottom:24px;}
.price-list{text-align:left;margin-bottom:24px;}
.price-list li{font-size:13px;color:#475569;padding:8px 0;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:8px;}
.price-list li::before{content:'✓';color:#3b82f6;font-weight:700;font-size:14px;flex-shrink:0;}
.price-note{font-size:12px;color:#94a3b8;text-align:center;margin-top:32px;line-height:1.8;}

@media(min-width:980px){
  .price-scroll{overflow:visible;padding-top:20px;}
  .price-grid{min-width:0;justify-content:center;}
}

/* ===== FLOW ===== */
.flow-steps{display:flex;flex-direction:column;gap:48px;align-items:center;}
.flow-step{text-align:center;width:100%;max-width:400px;}
.flow-num{width:48px;height:48px;border-radius:50%;background:#3b82f6;color:#fff;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.flow-step h3{font-size:16px;font-weight:600;margin-bottom:8px;text-align:center;}
.flow-step p{font-size:13px;color:#64748b;line-height:1.7;text-align:center;max-width:280px;margin:0 auto;}
.flow-tip{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:20px;text-align:center;font-size:14px;color:#1e3a5f;font-weight:500;margin-top:48px;}

@media(min-width:769px){
  .flow-steps{flex-direction:row;gap:24px;align-items:flex-start;}
  .flow-step{flex:1;position:relative;max-width:none;}
  .flow-step:not(:last-child)::after{content:'';position:absolute;top:24px;right:-12px;width:24px;height:2px;background:#cbd5e1;}
}

/* ===== FAQ ===== */
.faq-list{max-width:720px;margin:0 auto;}
.faq-item{border-bottom:1px solid #e2e8f0;}
.faq-q{width:100%;background:none;border:none;padding:20px 0;font-size:15px;font-weight:600;color:#1e293b;text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:inherit;line-height:1.6;}
.faq-q::after{content:'+';font-size:22px;color:#3b82f6;transition:transform .3s;flex-shrink:0;margin-left:16px;}
.faq-q.open::after{transform:rotate(45deg);}
.faq-a{max-height:0;overflow:hidden;transition:max-height .35s ease;font-size:14px;color:#64748b;line-height:1.8;}
.faq-a-inner{padding:0 0 20px;}

/* ===== CTA / FORM ===== */
.cta-section{background:linear-gradient(160deg,#1a2332,#273548);color:#fff;padding:80px 24px;text-align:center;}
.cta-section .section-title{color:#fff;}
.cta-section .section-sub{color:#94a3b8;}
.demo-form-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:40px 32px;max-width:520px;margin:0 auto;text-align:left;}
.demo-form-card h3{font-size:20px;font-weight:700;margin-bottom:4px;color:#fff;}
.demo-form-card .form-note{font-size:13px;color:#94a3b8;margin-bottom:24px;}
.demo-form-card label{display:block;font-size:13px;font-weight:500;color:#cbd5e1;margin-bottom:6px;margin-top:16px;}
.demo-form-card input,.demo-form-card select,.demo-form-card textarea{width:100%;padding:12px 14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:8px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;}
.demo-form-card input:focus,.demo-form-card select:focus,.demo-form-card textarea:focus{border-color:#3b82f6;}
.demo-form-card input::placeholder,.demo-form-card textarea::placeholder{color:#64748b;}
.demo-form-card select option{background:#273548;color:#fff;}
.demo-form-card textarea{resize:vertical;min-height:60px;}
.btn-submit{width:100%;padding:16px;font-size:16px;font-weight:700;color:#fff;background:linear-gradient(135deg,#3b82f6,#2563eb);border:none;border-radius:8px;cursor:pointer;margin-top:20px;transition:transform .2s,box-shadow .2s;font-family:inherit;}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(59,130,246,.35);}
.pp-agree-label{display:flex!important;align-items:flex-start;gap:8px;margin:16px 0 8px;font-size:13px;color:#cbd5e1;cursor:pointer;line-height:1.6;}
.pp-agree-label input[type='checkbox']{margin-top:4px;width:18px;height:18px;min-width:18px;accent-color:#3b82f6;flex-shrink:0;-webkit-appearance:checkbox;appearance:checkbox;}
.pp-agree-label a{color:#60a5fa;text-decoration:underline;}

/* ===== FOOTER ===== */
.site-footer{background:#1a2332;color:#64748b;text-align:center;padding:32px 24px;font-size:13px;border-top:1px solid rgba(255,255,255,.06);}
.site-footer a{color:#60a5fa;margin:0 12px;}

/* ===== MOBILE STICKY CTA ===== */
.mobile-sticky{display:none;position:fixed;bottom:0;left:0;width:100%;background:rgba(26,35,50,.96);backdrop-filter:blur(12px);padding:12px 24px;z-index:99;border-top:1px solid rgba(255,255,255,.08);}
.mobile-sticky a{display:block;text-align:center;font-size:15px;font-weight:700;color:#fff;background:linear-gradient(135deg,#3b82f6,#2563eb);padding:14px;border-radius:8px;}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .hero{min-height:80vh;padding:100px 20px 60px;}
  .pain-grid,.feat-grid,.num-grid{grid-template-columns:1fr;}
  .ba-content{grid-template-columns:1fr;gap:32px;}
  .ba-grid{grid-template-columns:1fr;gap:16px;}
  .ba-arrow{transform:rotate(90deg);padding:0;margin:8px auto;}
  .ba-stat{flex-direction:column;gap:12px;}
  .ba-screenshot{flex-direction:row;justify-content:center;}
  .phone-mockup{max-width:180px;}
  .phone-mockup.small{max-width:140px;}
  .compare-wrap{margin:0 -24px;border-radius:0;border-left:none;border-right:none;}
  .mobile-sticky{display:block;}
  .section{padding:72px 0;}
  .demo-form-card{padding:28px 20px;}
  .price-card{min-width:280px;}
}
@media(max-width:480px){
  .hero h1{font-size:26px;}
  .btn-primary{padding:14px 28px;font-size:15px;}
  .price-amount{font-size:34px;}
  .phone-mockup{max-width:160px;}
  .phone-mockup.small{max-width:130px;}
  .price-card{min-width:260px;}
}

.fade-up{opacity:0;transform:translateY(32px);transition:opacity .7s ease,transform .7s ease;}
.fade-up.visible{opacity:1;transform:translateY(0);}

.price-card li.disabled {
  color: #94a3b8;
  text-decoration: line-through;
  opacity: .5;
}

  
</style>
</head>
<body>

<!-- ========== HEADER ========== -->
<header class="site-header">
  <div class="header-inner">
    <div class="header-logo">アキナイ<span>AI</span></div>
  </div>
</header>

<!-- ========== HERO ========== -->
<section class="hero" id="top">
  <div class="hero-content">
    <div class="hero-badge">飲食店向け LINE × AI SaaS</div>
    <h1>注文からリピーター化まで、<br><em>AIがすべて自動で回す。</em></h1>
    <p>LINE注文・顧客管理・AI自動配信・味覚分析。<br>飲食店の「また来たい」をつくる仕組みを、まるごと自動化します。</p>
    <a href="#contact" class="btn-primary">30秒で無料デモに申し込む →</a>
    <a href="#pain" class="btn-secondary">どんな課題を解決できる？ ↓</a>
  </div>
</section>

<!-- ========== PAIN POINTS ========== -->
<section class="section section-light" id="pain">
  <div class="container">
    <div class="text-center">
      <span class="section-label">Problem</span>
      <h2 class="section-title">飲食店が抱える3つの課題</h2>
      <p class="section-sub mx-auto">多くのお店が直面する共通の悩み。アキナイAIはこれらをまとめて解決します。</p>
    </div>
    <div class="pain-grid">
      <div class="pain-card fade-up">
        <div class="pain-icon"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
        <h3>常連さんへの接し方がわからない</h3>
        <p>やった方がいいとは思うが、何をすればいいかわからない。</p>
      </div>
      <div class="pain-card fade-up">
        <div class="pain-icon"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></div>
        <h3>お客様の好みを把握しきれない</h3>
        <p>常連さんが増えるほど手が回らない。</p>
      </div>
      <div class="pain-card fade-up<span class="cursor">█</span>
